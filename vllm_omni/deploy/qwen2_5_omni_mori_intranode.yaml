# Qwen2.5-Omni intra-node deploy using Mori XGMI transfer.
#
# Verified on a single AMD Instinct MI300X OAM node (8x GPU, 192GB HBM3,
# gfx942). Each stage uses tensor_parallel_size=2 (6 GPUs total) and
# stage-to-stage KV transfers flow over Mori's XGMI (AMD Infinity Fabric
# GPU-to-GPU direct link) backend.
#
# Pipeline wiring (stage_id, execution_type, model_stage, input_sources,
# custom processors, ``detokenize`` / ``stop_token_ids`` constraints) lives
# in ``vllm_omni/model_executor/models/qwen2_5_omni/pipeline.py`` and is
# merged into the stages below by the deploy loader.
#
# Usage:
#   vllm serve Qwen/Qwen2.5-Omni-7B --omni --log-stats \
#     --deploy-config vllm_omni/deploy/qwen2_5_omni_mori_intranode.yaml
async_chunk: false

connectors:
  mori_connector:
    name: MoriTransferEngineConnector
    extra:
      host: "auto"
      zmq_port: 50051
      backend_type: "xgmi"
      device_name: ""
      memory_pool_size: 536870912     # 512 MB
      memory_pool_device: "cuda"      # GPU memory required for XGMI RDMA transfers
      xgmi_num_streams: 64
      xgmi_num_events: 64
      qp_per_transfer: 1
      num_worker_threads: 1
      post_batch_size: -1

stages:
  - stage_id: 0
    tensor_parallel_size: 2
    max_num_seqs: 10
    gpu_memory_utilization: 0.8
    enforce_eager: true
    devices: "6,7"
    engine_extras:
      mm_processor_cache_gb: 0
    output_connectors:
      to_stage_1: mori_connector
    default_sampling_params:
      temperature: 0.0
      top_p: 1.0
      top_k: -1
      max_tokens: 2048
      seed: 42
      repetition_penalty: 1.1

  - stage_id: 1
    tensor_parallel_size: 2
    max_num_seqs: 10
    gpu_memory_utilization: 0.8
    enforce_eager: true
    devices: "2,3"
    input_connectors:
      from_stage_0: mori_connector
    output_connectors:
      to_stage_2: mori_connector
    default_sampling_params:
      temperature: 0.9
      top_p: 0.8
      top_k: 40
      max_tokens: 2048
      seed: 42
      repetition_penalty: 1.05

  - stage_id: 2
    tensor_parallel_size: 2
    max_num_seqs: 1
    gpu_memory_utilization: 0.3
    enforce_eager: true
    max_num_batched_tokens: 32768
    devices: "4,5"
    input_connectors:
      from_stage_1: mori_connector
    default_sampling_params:
      temperature: 0.0
      top_p: 1.0
      top_k: -1
      max_tokens: 2048
      seed: 42
      repetition_penalty: 1.1
