  # Qwen2.5-Omni single-node config using Mori XGMI transfer (TP2).
  #
  # Each stage uses tensor_parallel_size=2 (2 GPUs per stage, 6 GPUs total).
  # Stages communicate via XGMI (AMD Infinity Fabric GPU-to-GPU direct link).
  #
  # Hardware:
  #   - GPU: 8x AMD Instinct MI300X OAM (192GB HBM3, gfx942)
  #   - Platform: ROCm
  #
  # Usage (single machine, full deployment):
  #   vllm serve <model> --omni \
  #     --stage-configs-path <this_file> --log-stats

  stage_args:
    - stage_id: 0
      stage_type: llm
      runtime:
        process: true
        devices: "6,7"  
        max_batch_size: 10
      engine_args:
        model_stage: thinker
        model_arch: Qwen2_5OmniForConditionalGeneration
        worker_type: ar
        scheduler_cls: vllm_omni.core.sched.omni_ar_scheduler.OmniARScheduler
        gpu_memory_utilization: 0.8
        enforce_eager: true
        trust_remote_code: true
        engine_output_type: latent
        enable_prefix_caching: false
        mm_processor_cache_gb: 0
        tensor_parallel_size: 2
      is_comprehension: true
      final_output: true
      final_output_type: text
      default_sampling_params:
        temperature: 0.0
        top_p: 1.0
        top_k: -1
        max_tokens: 2048
        seed: 42
        detokenize: True
        repetition_penalty: 1.1
      output_connectors:
        to_stage_1: mori_connector

    - stage_id: 1
      stage_type: llm
      runtime:
        process: true
        devices: "2,3"
        max_batch_size: 10
      engine_args:
        model_stage: talker
        model_arch: Qwen2_5OmniForConditionalGeneration
        worker_type: ar
        scheduler_cls: vllm_omni.core.sched.omni_ar_scheduler.OmniARScheduler
        gpu_memory_utilization: 0.8
        enforce_eager: true
        trust_remote_code: true
        enable_prefix_caching: false
        engine_output_type: latent
        tensor_parallel_size: 2
      engine_input_source: [0]
      custom_process_input_func: vllm_omni.model_executor.stage_input_processors.qwen2_5_omni.thinker2talker
      default_sampling_params:
        temperature: 0.9
        top_p: 0.8
        top_k: 40
        max_tokens: 2048
        seed: 42
        detokenize: True
        repetition_penalty: 1.05
        stop_token_ids: [8294]
      input_connectors:
        from_stage_0: mori_connector
      output_connectors:
        to_stage_2: mori_connector

    - stage_id: 2
      stage_type: llm
      runtime:
        process: true
        devices: "4,5"
        max_batch_size: 1
      engine_args:
        model_stage: code2wav
        model_arch: Qwen2_5OmniForConditionalGeneration
        worker_type: generation
        scheduler_cls: vllm_omni.core.sched.omni_generation_scheduler.OmniGenerationScheduler
        gpu_memory_utilization: 0.3
        enforce_eager: true
        trust_remote_code: true
        enable_prefix_caching: false
        max_num_batched_tokens: 32768
        engine_output_type: audio
        tensor_parallel_size: 2
      engine_input_source: [1]
      final_output: true
      final_output_type: audio
      default_sampling_params:
        temperature: 0.0
        top_p: 1.0
        top_k: -1
        max_tokens: 2048
        seed: 42
        detokenize: True
        repetition_penalty: 1.1
      input_connectors:
        from_stage_1: mori_connector

  runtime:
    enabled: true
    defaults:
      window_size: -1
      max_inflight: 16
    connectors:
      mori_connector:
        name: MoriTransferEngineConnector
        extra:
          host: "auto"
          zmq_port: 50051
          backend_type: "xgmi"
          device_name: ""
          memory_pool_size: 536870912     # 512 MB
          memory_pool_device: "cuda"      # GPU memory required for XGMI RDMA transfers
          xgmi_num_streams: 64
          xgmi_num_events: 64
          qp_per_transfer: 1
          num_worker_threads: 1
          post_batch_size: -1
    edges:
      - from: 0
        to: 1
        window_size: -1
      - from: 1
        to: 2
        window_size: -1
